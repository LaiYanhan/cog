agent: ./configs/agents/claude_code_deepseek.yaml
environment: docker-python3.12-uv
cog: true
prompt: just-solve

model:
  provider: deepseek
  name: deepseek-v4-flash

thinking: high
pass_policy: all-cases

# Dev set: 5 problems, 23 checkpoints, 2 Easy / 2 Medium / 1 Hard
problems:
  - code_search
  - migrate_configs
  - database_migration
  - pwd_manager
  - dag_execution

save_dir: outputs
save_template: ${model.provider}/${agent.type}-${agent.version}_${prompt}_${now:%Y%m%dT%H%M}
